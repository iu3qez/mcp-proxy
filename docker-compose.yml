name: mcp-proxy

networks:
  traefik:
    external: true
    name: traefik

services:
  mcp-proxy:
    build: .
    container_name: mcp-proxy
    restart: unless-stopped
    environment:
      - TRACKING_API_TOKEN=${TRACKING_API_TOKEN}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # Main router — requires bearer token auth
      - "traefik.http.routers.mcp-rtr.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mcp-rtr.entrypoints=websecure"
      - "traefik.http.routers.mcp-rtr.middlewares=mcp-auth"
      - "traefik.http.routers.mcp-rtr.service=mcp-svc"
      # Service
      - "traefik.http.services.mcp-svc.loadbalancer.server.port=8080"
      # Middleware: bearer token auth via traefik-plugin-apikey
      - "traefik.http.middlewares.mcp-auth.plugin.apikey.keySource=header"
      - "traefik.http.middlewares.mcp-auth.plugin.apikey.headerName=Authorization"
      - "traefik.http.middlewares.mcp-auth.plugin.apikey.headerValuePrefix=Bearer "
      - "traefik.http.middlewares.mcp-auth.plugin.apikey.keys=${BEARER_TOKEN}"
      # Health check router — no auth, higher priority
      - "traefik.http.routers.mcp-health-rtr.rule=Host(`${DOMAIN}`) && Path(`/status`)"
      - "traefik.http.routers.mcp-health-rtr.entrypoints=websecure"
      - "traefik.http.routers.mcp-health-rtr.priority=20"
      - "traefik.http.routers.mcp-health-rtr.service=mcp-svc"
